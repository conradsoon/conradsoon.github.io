<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slouching Towards San Francisco - OG Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #111;
    }

    .og-card {
      width: 1200px;
      height: 630px;
      background: #faf9f7;
      position: relative;
      overflow: hidden;
    }

    .bg-image {
      position: absolute;
      top: 0px;
      left: 0;
      width: 100%;
      height: auto;
    }

    .content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(to bottom,
        rgba(250, 249, 247, 0) 0%,
        rgba(250, 249, 247, 0.7) 40%,
        rgba(250, 249, 247, 0.95) 60%,
        rgba(250, 249, 247, 1) 75%);
    }

    .title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 42px;
      font-weight: 400;
      font-style: italic;
      color: #000;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .quote {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 26px;
      line-height: 1.4;
      color: #1a1a1a;
      font-style: italic;
      max-width: 900px;
    }

    .attribution {
      font-style: normal;
      color: #555;
    }

    .signature {
      position: absolute;
      bottom: 25px;
      right: 35px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 24px;
      color: rgba(0, 0, 0, 0.25);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="og-card">
    <img class="bg-image" src="slouchingtowards (1).png" alt="">

    <div class="content">
      <h1 class="title">[slouching towards san francisco]</h1>
      <p class="quote">"These are not the misplaced children of 1967, but children who have always known what they wanted to be."</p>
    </div>
    <span class="signature">@eigen_moomin</span>
  </div>
</body>
</html>
